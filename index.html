<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バイト給与計算</title>
<link rel="stylesheet" href="style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="bg-glow"></div>
<main>
  <header>
    <h1>バイト給与計算</h1>
  </header>

  <div id="tab-panels">
    <section class="tab-panel active" data-tab="salary">
      <div class="card nav-card" id="calc-section">
        <div class="month-nav">
          <button class="nav-btn" id="salary-prev-btn" aria-label="前の月">‹</button>
          <div class="month-nav-label" id="salary-month-label"></div>
          <button class="nav-btn" id="salary-next-btn" aria-label="次の月">›</button>
        </div>
        <p id="status-message"></p>
      </div>

      <div class="card hero-card" id="result-section" style="display:none;">
        <div class="hero-total">
          <div class="hero-label">合計支給額</div>
          <div class="hero-amount" id="hero-amount">¥0</div>
          <div class="hero-sub" id="hero-sub"></div>
        </div>
        <div id="summary-grid" class="summary-grid"></div>
        <div class="shift-list" id="shift-list">
          <div id="shifts-body"></div>
        </div>
      </div>
    </section>

    <section class="tab-panel" data-tab="settings">
      <div class="card" id="auth-section">
        <h2>Googleカレンダー連携</h2>
        <div class="auth-row">
          <button id="signin-btn">Googleでログイン</button>
          <button id="signout-btn" class="secondary" style="display:none;">ログアウト</button>
          <span id="auth-status" class="status-pill"><span class="dot"></span>未接続</span>
        </div>
      </div>

      <div class="card" id="settings-section">
        <h2>バイト先の設定</h2>
        <div id="jobs-container"></div>
        <div class="add-job-row">
          <button id="add-job-btn" class="secondary">+ バイトを追加</button>
        </div>
        <div class="save-row">
          <button id="save-settings-btn">設定を保存</button>
          <span id="save-status" class="status-pill"></span>
        </div>
      </div>
    </section>

    <section class="tab-panel" data-tab="report">
      <div class="card" id="report-section">
        <div class="row report-header-row">
          <h2>過去のレポート</h2>
          <button id="report-refresh-btn" class="icon-btn" title="更新" aria-label="更新">⟳</button>
        </div>
        <div class="month-nav">
          <button class="nav-btn" id="report-prev-btn" aria-label="前の6ヶ月">‹</button>
          <div class="month-nav-label" id="report-range-label"></div>
          <button class="nav-btn" id="report-next-btn" aria-label="次の6ヶ月">›</button>
        </div>
        <p id="report-status" class="muted"></p>
        <div id="report-chart-wrap"></div>
        <div id="report-legend" class="report-legend"></div>
        <div id="report-table" class="report-table"></div>
      </div>
    </section>
  </div>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="salary">
      <span class="tab-icon tab-icon-yen">¥</span>
      <span>給与</span>
    </button>
    <button class="tab-btn" data-tab="settings">
      <span class="tab-icon tab-icon-gear">⚙</span>
      <span>設定</span>
    </button>
    <button class="tab-btn" data-tab="report">
      <span class="tab-icon tab-icon-chart"><i></i><i></i><i></i></span>
      <span>レポート</span>
    </button>
  </nav>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
